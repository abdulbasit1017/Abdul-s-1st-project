{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <h2 class="text-center mb-4">Shop by Categories</h2>

    <div class="row">

        {% for category in categories %}
        <div class="col-lg-3 col-md-4 col-sm-6 mb-4">

            <div class="card text-center shadow-sm p-3 h-100">

                <!-- ICON -->
                <div style="font-size:40px;">📦</div>

                <!-- NAME -->
                <h5 class="mt-2">{{ category.name }}</h5>

                <!-- BUTTON -->
                <a href="/category/{{ category.slug }}/" class="btn btn-dark mt-3">
                    Explore
                </a>

            </div>

        </div>
        {% endfor %}

    </div>
</div>

{% endblock %}
