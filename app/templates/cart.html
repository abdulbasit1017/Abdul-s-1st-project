<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6fa;
        }

        .cart-box {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .total-box {
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container mt-4">

        <h2 class="mb-4">🛒 My Cart</h2>

        <!-- CART ITEMS -->
        <div id="cart-items"></div>

        <!-- TOTAL -->
        <div id="total" class="total-box"></div>

        <!-- CLEAR BUTTON -->
        <button onclick="clearCart()" class="btn btn-danger mt-3">
            Clear Cart
        </button>

    </div>

    <script>
        function loadCart() {

            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            let container = document.getElementById("cart-items");
            let totalDiv = document.getElementById("total");

            container.innerHTML = "";

            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = "<p>Your cart is empty 😢</p>";
                totalDiv.innerText = "";
                return;
            }

            cart.forEach(item => {

                total += item.price * item.qty;

                container.innerHTML += `
            <div class="cart-box">
                <h5>${item.name}</h5>
                <p>Price: Rs ${item.price}</p>
                <p>Quantity: ${item.qty}</p>
                <p><b>Subtotal:</b> Rs ${item.price * item.qty}</p>
            </div>
        `;
            });

            totalDiv.innerText = "Total: Rs " + total;
        }

        function clearCart() {
            localStorage.removeItem("cart");
            loadCart();
        }

        loadCart();
    </script>

</body>

</html>
