{% extends "base.html" %}

{% block content %}

<!-- HERO -->
<div class="hero">
    <h1>Welcome to eStore</h1>
    <p>Find the best products at amazing prices</p>
</div>

<!-- PRODUCTS -->
<div class="container mt-5">

    <!-- SEARCH BOX (only one system) -->
    <div class="mb-3">

    </div>

    <div class="row" id="product-list"></div>
</div>

<!-- SCRIPT -->
<script>
    let allProducts = [];

    // LOAD PRODUCTS
    function loadProducts(query = "") {

        let url = "/api/products/";

        if (query) {
            url += "?search=" + query;
        }

        fetch(url)
            .then(res => res.json())
            .then(data => {
                allProducts = data;
                displayProducts(data);
            })
            .catch(err => console.log("API Error:", err));
    }

    // DISPLAY PRODUCTS
    function displayProducts(products) {
        let container = document.getElementById("product-list");
        container.innerHTML = "";

        if (!products || products.length === 0) {
            container.innerHTML = "<p class='text-center'>No products found</p>";
            return;
        }

        products.forEach(p => {
            container.innerHTML += `
        <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
            <div class="card p-2">

                ${p.image ? `
                    <img src="${p.image}" class="img-fluid mb-2" />
                ` : ""}

                <h5>${p.name || p.title || "No Name"}</h5>

                <p class="text-muted">
                    ${(p.description || "").slice(0, 80)}
                </p>

                <h6 class="text-success">Rs ${p.price || 0}</h6>

                <a href="/product/${p.id}/" class="btn btn-primary w-100 mt-2">
                    View Detail
                </a>

                <button onclick="addToCart(${p.id})" class="btn btn-success w-100 mt-2">
                    Add to Cart
                </button>

            </div>
        </div>
        `;
        });
    }

    // CART
    function addToCart(id) {
        fetch(`/api/products/${id}/`)
            .then(res => res.json())
            .then(product => {

                let cart = JSON.parse(localStorage.getItem("cart")) || [];

                let existing = cart.find(item => item.id === product.id);

                if (existing) {
                    existing.qty += 1;
                } else {
                    cart.push({
                        id: product.id,
                        name: product.name || product.title,
                        price: product.price,
                        qty: 1
                    });
                }

                localStorage.setItem("cart", JSON.stringify(cart));

                alert("Product added to cart!");
            });
    }

    // 🔥 SEARCH (FIXED SINGLE SYSTEM)
    document.addEventListener("DOMContentLoaded", function () {

        const searchBox = document.getElementById("search");

        let timeout = null;

        searchBox.addEventListener("input", function () {

            clearTimeout(timeout);

            let value = this.value.trim();

            timeout = setTimeout(() => {
                loadProducts(value);
            }, 300); // debounce
        });

        loadProducts();
    });
</script>

{% endblock %}
