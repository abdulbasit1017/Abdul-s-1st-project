{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <h2 class="text-center mb-4">{{ category.name }}</h2>

    <!-- LOADING -->
    <div id="loading" class="text-center mb-3">
        Loading products...
    </div>

    <div class="row" id="product-list"></div>
</div>

<script>
    function loadCategoryProducts() {

        fetch("/api/categories/slug/{{ category.slug }}/")
            .then(res => res.json())
            .then(data => {

                let container = document.getElementById("product-list");
                let loading = document.getElementById("loading");

                container.innerHTML = "";
                loading.style.display = "none";

                let products = data.products || [];

                // EMPTY STATE
                if (products.length === 0) {
                    container.innerHTML = `
                    <div class="text-center">
                        <h5>No products found</h5>
                    </div>
                `;
                    return;
                }

                // SHOW PRODUCTS
                products.forEach(p => {

                    container.innerHTML += `
                    <div class="col-md-3 col-sm-6 mb-4">
                        <div class="card p-2 h-100">

                            <img src="${p.image || ''}" 
                                 class="img-fluid mb-2"
                                 style="height:200px; object-fit:cover;">

                            <h5>${p.name || 'No Name'}</h5>

                            <p>
                                ${(p.description || '').slice(0, 50)}
                            </p>

                            <h6 class="text-success">
                                Rs ${p.price || 0}
                            </h6>

                            <a href="/product/${p.id}/" 
                               class="btn btn-primary w-100 mt-2">
                                View Detail
                            </a>

                        </div>
                    </div>
                `;
                });

            })
            .catch(err => {

                console.log("API Error:", err);

                document.getElementById("loading").style.display = "none";

                document.getElementById("product-list").innerHTML = `
                <div class="text-center text-danger">
                    <h5>Failed to load products</h5>
                </div>
            `;
            });
    }

    document.addEventListener("DOMContentLoaded", loadCategoryProducts);
</script>

{% endblock %}
